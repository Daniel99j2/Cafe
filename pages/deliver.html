<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delivery</title>
    <link rel="stylesheet" href="main.css">
    <link rel="icon" type="image/x-icon" href="icon.png">
</head>
<body>
<script src="%base%/password.js"></script>
<script type="text/javascript">
    done = false;
    intervalId = null;

    window.addEventListener("load", () => {
        login()
        intervalId = setInterval(checkStatus, 1000)
        checkStatus();
        reloadItemList();
        document.getElementById("_deliveryItems").addEventListener("click", () => {
            reloadItemList()
        });
    });

    function reloadItemList() {
        allTicked = true;
        document.querySelectorAll('input').forEach(element => {
            if(element.dataset.deliveryitem === "true" && !element.checked) allTicked = false;
        });

        if(!allTicked) document.getElementById("startDelivery").disabled = true
        else document.getElementById("startDelivery").disabled = null;
    }

    function checkStatus() {
        if(done) return;
        id = new URLSearchParams(window.location.search).get("id");
        console.log("Checking status");

        const request = new XMLHttpRequest();
        request.open("GET", "api/order?id="+id);
        request.onload = async function () {
            if(request.status === 200) {
                json = JSON.parse(request.responseText);
                if(!json.deliverer) {
                    clearInterval(intervalId);
                    document.getElementById("startDelivery").disabled = true;
                    fetch('%base%/no_permission')
                        .then(response => response.text())
                        .then(data => {
                            let newDoc = new DOMParser().parseFromString(data, 'text/html');
                            document.documentElement.innerHTML = newDoc.documentElement.innerHTML;
                        })
                        .catch(error => console.error('Error loading the new page:', error));
                }
                document.getElementById("_status").textContent = "Status: " + json.status;
                document.getElementById("_status").dataset.status = json.status;
                document.getElementById("_deliverLocation").textContent = "Deliver to: \""+json.deliveryLocation+"\"";
                document.getElementById("_deliverLocation").dataset.status = json.deliveryLocation;
                if(json.currentStatusExpiry != null) {
                    document.getElementById("_timer").hidden = null;
                    document.getElementById("_timer").textContent = "⏰ " + new Date(json.currentStatusExpiry * 1000).toISOString().substring(14, 19);
                } else {
                    document.getElementById("_timer").hidden = true;
                }
                updateVisibility();
            } else {
                document.getElementById("_status").textContent = "Error getting status";
                document.getElementById("_status").dataset.status = "ERROR";
                document.getElementById("_timer").textContent = "⏰ ??:??";
            }
        }
        request.send();
    }

    function enterCode() {
        if(document.getElementById("_verifyCode").value.length === 4) {
            id = new URLSearchParams(window.location.search).get("id");

            const request = new XMLHttpRequest();
            request.open("POST", "api/deliver?id="+id);
            request.setRequestHeader("Code", document.getElementById("_verifyCode").value);
            request.onload = async function () {
                checkStatus();
            }
            request.send();
        }
    }

    function updateVisibility() {
        if(done) return;
        status = document.getElementById("_status").dataset.status;
        document.querySelectorAll('*').forEach(element => {
            if(element.dataset.basedonstatus === "true") {
                element.dataset.oldstyle = element.style
                element.style = "content-visibility:hidden;";
                element.hidden = true;
            }
        });
        if(status === "SENDING") {
            show("step1")
        } else if(status === "PREPARING") {
            show("step2")
            show("denyButton")
        } else if(status === "DELIVERING") {
            show("step3")
            show("denyButton")
        } else if(status === "SOLD") {
            show("step4")
        }
    }

    function show(elementId) {
        element = document.getElementById(elementId);
        element.hidden = null;
        if(element.dataset.basedonstatus === "true" && element.style != null) {
            element.style = element.dataset.oldstyle;
        }
    }

    async function nextMode() {
        const request = new XMLHttpRequest();
        request.open("PUT", "api/deliver?id="+id);
        request.onload = async function () {
            checkStatus();
        }
        request.send();
    }

    async function acceptDelivery(event) {
        nextMode()
    }

    function denyDelivery(event) {
        document.getElementById("denyModal").style.display = "flex";
    }

    function closeDeny() {
        document.getElementById("denyModal").style.display = "none";
        document.getElementById("denyMessage").value = "";
    }

    function confirmDeny(event) {
        event.preventDefault();
        const message = document.getElementById("denyMessage").value;

        const request = new XMLHttpRequest();
        const id = new URLSearchParams(window.location.search).get("id");
        request.open("DELETE", "api/deliver?id=" + id);
        request.setRequestHeader("FailReason", message)
        request.onload = async function () {
            if (request.status === 200) {
                checkStatus()
            } else {
                alert("Error denying delivery");
            }
        }
        request.send();

        document.getElementById("accept").disabled = true;
        document.getElementById("denyStep1").disabled = true;

        closeDeny();
    }
</script>
<sitetitle></sitetitle>
<h1>Delivering</h1>
<p id="_status">Status: PENDING</p>
<h3>Step 1: do you wanna do it</h3>
<div style="content-visibility:hidden;" id="step1" data-basedOnStatus="true">
    <button id="accept" onclick="acceptDelivery(event)" class="greenbutton">Accept</button>
    <button id="denyStep1" onclick="denyDelivery(event)" class="redbutton">Deny</button>
</div>
<h3>Step 2: Prepare food</h3>
<div style="content-visibility:hidden;" id="step2" data-basedOnStatus="true">
    <deliveryitems></deliveryitems>
    <button id="startDelivery" onclick="nextMode()"  class="greenbutton" style="display: block; margin: 10px auto;">Deliver Food</button>
</div>
<h3>Step 3: Deliver</h3>
<div style="content-visibility:hidden;" id="step3" data-basedOnStatus="true">
    <p id="_deliverLocation">Deliver to: </p>
    <label>When complete, enter code here:    <input onkeyup="enterCode()" type="text" placeholder="____" id="_verifyCode" class="verificationcode"></label>
</div>
<h3>Step 4: Review</h3>
<div style="content-visibility:hidden;" id="step4" data-basedOnStatus="true">
    <p>You got ⭐⭐⭐▪️▪️</p>
</div>
<div style="content-visibility:hidden;" id="denyButton" data-basedOnStatus="true">
    <button id="deny" onclick="denyDelivery(event)" class="redbutton">Deny</button>
</div>

<div style="display: block; position:absolute; bottom:0; right:0; padding-right: 20px; padding-bottom: 10px">
    <p id="_timer">TIMER</p>
</div>

<usericon></usericon>

<div id="denyModal" class="popup" style="display:none;">
    <div  class="popup-inner" style="padding:20px; border-radius:8px; max-width:400px; width:80%;">
        <h2>Deny Delivery</h2>
        <form onsubmit="confirmDeny(event)">
            <label>Please specify a reason for denying:<input type="text" id="denyMessage" style="width:100%;" autofocus required></label>
            <div style="margin-top:10px; text-align:right; display:flex; justify-content:flex-end; gap:10px;">
                <button type="button" onclick="closeDeny()" class="greybutton">Cancel</button>
                <button type="submit" class="redbutton">Submit</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
